<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Robb Barrett | Senior Manager – Marketo | Lumen Technologies</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #050816;
      --bg-alt: #0b1020;
      --accent: #4f46e5;
      --accent-soft: rgba(79, 70, 229, 0.12);
      --accent-strong: #7c3aed;
      --text-main: #f9fafb;
      --text-muted: #9ca3af;
      --card-bg: #111827;
      --border-subtle: rgba(156, 163, 175, 0.25);
      --chip-bg: rgba(55, 65, 81, 0.7);
      --shadow-soft: 0 18px 45px rgba(15, 23, 42, 0.85);
      --radius-lg: 18px;
      --radius-pill: 999px;
      --transition-fast: 180ms ease-out;
      --transition-med: 260ms ease-out;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
        "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #111827 0, #020617 55%, #000 100%);
      color: var(--text-main);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    main {
      max-width: 1120px;
      margin: 0 auto;
      padding: 32px 20px 64px;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(18px);
      background: linear-gradient(
        to bottom,
        rgba(2, 6, 23, 0.92),
        rgba(2, 6, 23, 0.75),
        transparent
      );
      border-bottom: 1px solid rgba(31, 41, 55, 0.7);
    }

    .nav-inner {
      max-width: 1120px;
      margin: 0 auto;
      padding: 14px 20px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-mark {
      width: 32px;
      height: 32px;
      border-radius: 12px;
      background: conic-gradient(
        from 210deg,
        #4f46e5,
        #22d3ee,
        #a855f7,
        #4f46e5
      );
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 0 1px rgba(15, 23, 42, 0.9),
        0 12px 30px rgba(15, 23, 42, 0.9);
    }

    .brand-mark span {
      font-size: 16px;
      font-weight: 700;
      color: #e5e7eb;
    }

    .brand-text {
      display: flex;
      flex-direction: column;
    }

    .brand-text .name {
      font-weight: 600;
      letter-spacing: 0.03em;
      font-size: 15px;
    }

    .brand-text .role {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.16em;
    }

    nav ul {
      display: flex;
      gap: 18px;
      list-style: none;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--text-muted);
    }

    nav a {
      position: relative;
      padding-bottom: 4px;
    }

    nav a::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: 0;
      width: 0;
      height: 2px;
      border-radius: 999px;
      background: linear-gradient(to right, #4f46e5, #22d3ee);
      transition: width var(--transition-fast);
    }

    nav a:hover::after {
      width: 100%;
    }

    .nav-cta {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .nav-cta a {
      font-size: 13px;
      padding: 7px 14px;
      border-radius: var(--radius-pill);
      border: 1px solid rgba(148, 163, 184, 0.6);
      color: var(--text-main);
      background: radial-gradient(circle at top left, #1f2937, #020617);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      box-shadow: 0 10px 25px rgba(15, 23, 42, 0.9);
      transition: transform var(--transition-fast),
        box-shadow var(--transition-fast),
        border-color var(--transition-fast),
        background var(--transition-fast);
    }

    .nav-cta a span.icon {
      font-size: 14px;
    }

    .nav-cta a:hover {
      transform: translateY(-1px);
      border-color: rgba(129, 140, 248, 0.9);
      background: radial-gradient(circle at top left, #111827, #020617);
      box-shadow: 0 16px 40px rgba(15, 23, 42, 0.95);
    }
